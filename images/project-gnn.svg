<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6a"/>
      <stop offset="100%" stop-color="#152d52"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg2)"/>
  <!-- Graph grid (surface code lattice) -->
  <!-- Horizontal edges -->
  <line x1="280" y1="95" x2="360" y2="95" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="360" y1="95" x2="440" y2="95" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="440" y1="95" x2="520" y2="95" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="280" y1="175" x2="360" y2="175" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="360" y1="175" x2="440" y2="175" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="440" y1="175" x2="520" y2="175" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="280" y1="255" x2="360" y2="255" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="360" y1="255" x2="440" y2="255" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="440" y1="255" x2="520" y2="255" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Vertical edges -->
  <line x1="280" y1="95" x2="280" y2="175" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="360" y1="95" x2="360" y2="175" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="440" y1="95" x2="440" y2="175" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="520" y1="95" x2="520" y2="175" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="280" y1="175" x2="280" y2="255" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="360" y1="175" x2="360" y2="255" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="440" y1="175" x2="440" y2="255" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="520" y1="175" x2="520" y2="255" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Data qubits (circles) -->
  <circle cx="280" cy="95" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="360" cy="95" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="440" cy="95" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="520" cy="95" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="280" cy="175" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="360" cy="175" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="440" cy="175" r="8" fill="rgba(255,255,255,0.25)"/>
  <circle cx="520" cy="175" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="280" cy="255" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="360" cy="255" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="440" cy="255" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="520" cy="255" r="8" fill="rgba(255,255,255,0.2)"/>
  <!-- Syndrome highlights -->
  <circle cx="320" cy="135" r="12" fill="rgba(255,100,100,0.15)" stroke="rgba(255,100,100,0.3)" stroke-width="1"/>
  <circle cx="480" cy="215" r="12" fill="rgba(255,100,100,0.15)" stroke="rgba(255,100,100,0.3)" stroke-width="1"/>
  <!-- Neural network arrows hint -->
  <path d="M330 140 Q400 175 470 210" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-dasharray="4 4"/>
  <!-- Label -->
  <text x="400" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="3">QUANTUM ERROR CORRECTION</text>
</svg>
