<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">

    <!-- MathJax for LaTeX support -->
    <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: {
        fontCache: 'global'
      }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>
</head>
<body>
    <header>
        <h1><a href="{{ '/' | relative_url }}" style="color: white; text-decoration: none;">{{ site.title }}</a></h1>
        <nav>
            <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="nav-active"{% endif %}>Home</a>
            <a href="{{ '/about' | relative_url }}" {% if page.url contains '/about' %}class="nav-active"{% endif %}>About</a>
            <a href="{{ '/blog' | relative_url }}" {% if page.url contains '/blog' %}class="nav-active"{% endif %}>Blog</a>
            <a href="{{ '/contact' | relative_url }}" {% if page.url contains '/contact' %}class="nav-active"{% endif %}>Contact</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-social">
            <a href="https://github.com/FedericoAstolfi" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/federico-astolfi-450250216" target="_blank">LinkedIn</a>
            <a href="https://arxiv.org/search/?query=astolfi+federico&searchtype=author" target="_blank">arXiv</a>
        </div>
        <p>&copy; 2026 {{ site.title }}</p>
    </footer>
    <script>
    // Scroll reveal
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('.card, .edu-item, .skill-tag, .social-card, .pub-item, .content h2, .content h3').forEach((el, i) => {
        el.classList.add('reveal');
        el.style.transitionDelay = (i % 5) * 90 + 'ms';
        revealObserver.observe(el);
    });

    // Typewriter effect for hero title
    const heroTitle = document.querySelector('.hero h2');
    if (heroTitle) {
        const text = heroTitle.textContent.trim();
        heroTitle.textContent = '';
        heroTitle.classList.add('typewriter-active');
        let i = 0;
        const type = () => {
            if (i < text.length) {
                heroTitle.textContent += text[i++];
                setTimeout(type, 75);
            } else {
                heroTitle.classList.remove('typewriter-active');
            }
        };
        setTimeout(type, 350);
    }
    </script>
</body>
</html>
