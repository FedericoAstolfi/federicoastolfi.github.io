<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    <!-- OpenGraph -->
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:image" content="{{ site.url }}/images/profile.jpg">
    <meta property="og:site_name" content="{{ site.title }}">
    {% if page.layout == 'post' %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">{% endif %}

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:image" content="{{ site.url }}/images/profile.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">

    <!-- MathJax for LaTeX support -->
    <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: {
        fontCache: 'global'
      }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>
</head>
<body>
    <header>
        <h1><a href="{{ '/' | relative_url }}" style="color: white; text-decoration: none;">{{ site.title }}</a></h1>
        <nav>
            <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="nav-active"{% endif %}>Home</a>
            <a href="{{ '/about' | relative_url }}" {% if page.url contains '/about' %}class="nav-active"{% endif %}>About</a>
            <a href="{{ '/publications' | relative_url }}" {% if page.url contains '/publications' %}class="nav-active"{% endif %}>Publications</a>
            <a href="{{ '/blog' | relative_url }}" {% if page.url contains '/blog' %}class="nav-active"{% endif %}>Blog</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-social">
            <a href="{{ site.scholar_url }}" target="_blank" title="Google Scholar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5.242 13.769L0 9.5 12 0l12 9.5-5.242 4.269C17.548 11.249 14.978 9.5 12 9.5c-2.977 0-5.548 1.748-6.758 4.269zM12 10a7 7 0 1 0 0 14 7 7 0 0 0 0-14z"/></svg>
                Scholar
            </a>
            <a href="https://orcid.org/{{ site.orcid_id }}" target="_blank" title="ORCID">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.372 0 0 5.372 0 12s5.372 12 12 12 12-5.372 12-12S18.628 0 12 0zM7.369 4.378c.525 0 .947.431.947.947s-.422.947-.947.947a.95.95 0 0 1-.947-.947c0-.525.422-.947.947-.947zm-.722 3.038h1.444v10.041H6.647V7.416zm3.562 0h3.9c3.712 0 5.344 2.653 5.344 5.025 0 2.578-2.016 5.025-5.325 5.025h-3.919V7.416zm1.444 1.303v7.444h2.297c3.272 0 4.022-2.484 4.022-3.722 0-2.016-1.284-3.722-3.931-3.722h-2.388z"/></svg>
                ORCID
            </a>
            <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" target="_blank" title="LinkedIn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                LinkedIn
            </a>
            <a href="https://arxiv.org/search/?query=astolfi+federico&searchtype=author" target="_blank" title="arXiv">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4v16h16V4H4zm0-2h16a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm5 7.5L12 7l3 2.5L12 12 9 9.5zM7 14h10v1H7v-1zm0 2.5h10v1H7v-1z"/></svg>
                arXiv
            </a>
        </div>
        <p>&copy; 2026 {{ site.title }}</p>
    </footer>
    <script>
    // Scroll reveal
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('.card, .edu-item, .skill-tag, .social-card, .pub-item, .talk-item, .content h2, .content h3').forEach((el, i) => {
        el.classList.add('reveal');
        el.style.transitionDelay = (i % 5) * 90 + 'ms';
        revealObserver.observe(el);
    });

    // Typewriter effect for hero title
    const heroTitle = document.querySelector('.hero h2');
    if (heroTitle) {
        const text = heroTitle.textContent.trim();
        heroTitle.textContent = '';
        heroTitle.classList.add('typewriter-active');
        let i = 0;
        const type = () => {
            if (i < text.length) {
                heroTitle.textContent += text[i++];
                setTimeout(type, 75);
            } else {
                heroTitle.classList.remove('typewriter-active');
            }
        };
        setTimeout(type, 350);
    }

    document.querySelectorAll('.pub-toggle').forEach(btn => {
        const abstract = btn.previousElementSibling;
        if (abstract.scrollHeight <= abstract.clientHeight) {
            btn.style.display = 'none';
        }
        btn.addEventListener('click', () => {
            abstract.classList.toggle('expanded');
            btn.textContent = abstract.classList.contains('expanded') ? '▾ Show less' : '▸ Show more';
        });
    });
    </script>
</body>
</html>
